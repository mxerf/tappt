server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Always revalidate assets via ETag — browsers get 304 when unchanged,
  # fresh bytes the moment a file changes. No stale cache after redeploys.
  etag on;

  location ~* \.(js|css)$ {
    add_header Cache-Control "no-cache, must-revalidate";
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Security headers; they cost nothing for a static playground.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # Allow esm.sh (library CDN, with redirect targets on subdomains).
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://esm.sh https://*.esm.sh; connect-src 'self' https://esm.sh https://*.esm.sh; style-src 'self' 'unsafe-inline'; img-src 'self' data:; base-uri 'self';" always;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
